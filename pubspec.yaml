name: railguide
description: RailGuide - Indoor Navigation Assistant for Railway Stations
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Localizations
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # QR Scanner
  mobile_scanner: ^5.2.3

  # Text to Speech
  flutter_tts: ^4.2.0

  # Compass
  flutter_compass: ^0.8.0

  # Vector math
  vector_math: ^2.1.4

  # Persistent local storage (login + reports)
  shared_preferences: ^2.3.2

  # Firebase (uncomment after FlutterFire CLI setup)
  # firebase_core: ^2.24.2
  # firebase_auth: ^4.16.0
  # cloud_firestore: ^4.14.0

  # UI / Utilities
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true