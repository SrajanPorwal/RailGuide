name: railguide
description: RailGuide - Indoor Navigation Assistant for Railway Stations
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Localizations
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # QR Scanner
  mobile_scanner: ^5.2.3

  # Text to Speech
  flutter_tts: ^4.2.0

  # Compass (real-time heading)
  flutter_compass: ^0.8.0

  # Vector math (angle calculations)
  vector_math: ^2.1.4

  # UI / Utilities
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true